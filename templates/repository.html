{% extends 'base.html' %}

{% block content %}

<p>
    <a class="btn btn-primary" href="/create_branch">Создать новую ветку</a>
</p>

<h1>Ветки в репозитории {{ branches[0].repository.title }}</h1>
<table class="table">
    <tbody>
    {% for branch in branches %}
    <tr class="table-secondary">
        <td>
            <a href="/{{ branch.repository.user.nickname }}/repositories/{{ branch.repository.title }}/{{ branch.title }}">{{
                branch.title }}</a></td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
