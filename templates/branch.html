{% extends 'base.html' %}

{% block content %}

<h1>Коммиты в ветке {{ branch }}</h1>
<table class="table">
    <tbody>
    {% for commit in commits %}
    <tr class="table-secondary">
        <td><a href="/{{ nickname }}/repositories/{{ repository }}/{{ branch }}/{{ commit.sha1 }}">{{
                commit.description }}</a></td>
        <td>{{ commit.sha1 }}</td>
        <td>{{ commit.date_time }}</td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
