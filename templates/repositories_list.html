{% extends 'base.html' %}

{% block content %}

<p>
    <a class="btn btn-primary" href="{{ url_for('create_repository') }}">Создать новый репозиторий</a>
</p>

<h1>Ваши репозитории:</h1>
<div class="table-responsive">
    <table class="table">
        <thead>
        <tr class="table-secondary">
            <th>Название</th>
            <th>Описание</th>
            <th>Соавторы</th>
        </tr>
        </thead>
        <tbody>
        {% for repo in repos %}
        <tr class="table-secondary">
            <td><a href="{{ url_for('show_repository', nickname=repo.user.nickname, repository=repo.title) }}">{{
                repo.title }}</a></td>
            <td>{{ repo.description }}</td>
            <td>{% for author in repo.coauthors %}
                <a href="{{ url_for('profile', nickname=author.nickname) }}">
                <ul>{{ author.nickname }}</ul></a>
                {% endfor %}
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
